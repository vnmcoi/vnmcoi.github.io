---
layout: default
---
<header class="post-header">
  <h1 class="post-title">{{ page.title }}</h1>
</header>

<div class="content">

  {% assign url_vn = page.url | replace: '/wiki/', '/wikivn/' | replace: '.html', '' %}
  {% for post in site.wikivn %}
  {% assign post_url = post.url | replace: '.html', '' %}
  {% if post_url == url_vn %}
  {% break %}
  {% endif %}
  {% endfor %}

  <div style="margin-top: 25px;">
    {{ content }}
  </div>
</div>
